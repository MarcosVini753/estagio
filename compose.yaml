services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-biblioteca}
      POSTGRES_USER: ${POSTGRES_USER:-biblioteca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biblioteca}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biblioteca} -d ${POSTGRES_DB:-biblioteca}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    working_dir: /app/backend
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.local
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-docker-development-only}
      DJANGO_DEBUG: "true"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      POSTGRES_DB: ${POSTGRES_DB:-biblioteca}
      POSTGRES_USER: ${POSTGRES_USER:-biblioteca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biblioteca}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
