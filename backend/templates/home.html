<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sala de Informática — Ambiente de demonstração</title>
  <style>
    :root { font-family: system-ui, sans-serif; color-scheme: light dark; }
    body { max-width: 760px; margin: 0 auto; padding: 2rem 1rem; }
    .warning { border: 1px solid #b7791f; padding: 1rem; border-radius: .5rem; margin-bottom: 1.5rem; }
    .profiles { display: grid; gap: .75rem; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    button { padding: .8rem; cursor: pointer; }
    code { word-break: break-word; }
  </style>
</head>
<body>
  <h1>Sala de Informática da Biblioteca da UFAC</h1>
  <div class="warning" role="alert">
    Este ambiente usa autorização simulada. Não há autenticação nem identidade real.
  </div>
  <h2>Escolha o perfil de teste</h2>
  <div id="profiles" class="profiles"></div>
  <p>Perfil atual: <strong id="current-profile">nenhum</strong></p>
  <p><a href="/api/docs/">Documentação interativa da API</a></p>

  <script>
    async function loadContext() {
      const response = await fetch('/api/v1/demo/context/');
      const context = await response.json();
      document.getElementById('current-profile').textContent = context.profile || 'nenhum';
      const root = document.getElementById('profiles');
      root.innerHTML = '';
      for (const item of context.available_profiles) {
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = item.label;
        button.addEventListener('click', () => selectProfile(item.value));
        root.appendChild(button);
      }
    }

    async function selectProfile(profile) {
      const response = await fetch('/api/v1/demo/select-profile/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({profile})
      });
      if (!response.ok) {
        alert('Não foi possível selecionar o perfil.');
        return;
      }
      await loadContext();
    }

    loadContext();
  </script>
</body>
</html>
